<!DOCTYPE html>
<html>
<head>
    <title>Desensamblador Lua - Reverse codificado </title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; margin: 0; padding: 0; }
        .container { width: 80%; margin: 50px auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0, 0, 0, 0.1); }
        textarea, input[type="file"] { width: 100%; margin-bottom: 10px; }
        button { display: block; width: 100%; padding: 10px; background: #4CAF50; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background: #45a049; }
        #output { margin-top: 20px; white-space: pre-wrap; background-color: #f9f9f9; padding: 10px; border: 1px solid #ccc; }
        .loader { border: 16px solid #f3f3f3; border-radius: 50%; border-top: 16px solid #3498db; width: 60px; height: 60px; animation: spin 2s linear infinite; margin: 20px auto; display: none; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Desensamblador Lua - Reverse codificado</h1>
        <p>Introduce el ensamblado:</p>
        <textarea id="inputInstruction" placeholder="Paste here..."></textarea>
        <p>O sube un archivo de texto:</p>
        <input type="file" id="fileInput">
        <button onclick="sendToAPI()">Procesar</button>
        <div class="loader" id="loader"></div>
        <h2>Here Procesando:</h2>
        <div id="output"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
